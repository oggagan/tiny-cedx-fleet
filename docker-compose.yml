services:
  tinycedx:
    build: .
    platform: linux/amd64
    environment:
      REPLAY_LLM: "true"
      SEED_DIR: "/app/seed"
      CASE_ID: "${CASE_ID:-CEDX-BEA205}"    # live-assigned CASE_ID for this submission
      PIPELINE_NOW: "2026-06-26"
      # For the held-out real-LLM run, graders set:
      #   REPLAY_LLM=false, LLM_API_KEY=..., LLM_BASE_URL=..., LLM_MODEL=deepseek-chat
      #   (or gpt-4o-mini / claude-3-5-haiku / gemini-1.5-flash), LLM_MODEL_STRONG=...
    volumes:
      - ./out:/app/out
